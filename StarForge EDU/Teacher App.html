<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarForge EDU · Teacher App</title>
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #F2EDDF; }
  body { font-family: 'Manrope', system-ui, sans-serif; color: #1F1B16; }

  /* Canvas backdrop: warm cream with subtle dot grid */
  .sf-canvas-bg {
    position: fixed; inset: 0;
    background: #F2EDDF;
    background-image: radial-gradient(circle at 1px 1px, rgba(54,30,14,0.10) 1px, transparent 0);
    background-size: 22px 22px;
    z-index: -1;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div class="sf-canvas-bg"></div>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tf-components.jsx"></script>
<script type="text/babel" src="tf-screens-a.jsx"></script>
<script type="text/babel" src="tf-screens-b.jsx"></script>
<script type="text/babel" src="tf-screens-c.jsx"></script>
<script type="text/babel" src="tf-screens-d1.jsx"></script>
<script type="text/babel" src="tf-screens-d2.jsx"></script>
<script type="text/babel" src="tf-screens-d3.jsx"></script>
<script type="text/babel" src="tf-screens-auth.jsx"></script>
<script type="text/babel" src="tf-screens-cards.jsx"></script>
<script type="text/babel" src="tf-screens-print.jsx"></script>
<script type="text/babel" src="tf-screens-aichat.jsx"></script>
<script type="text/babel" src="tf-screens-mgmt.jsx"></script>
<script type="text/babel" src="tf-screens-surveys.jsx"></script>
<script type="text/babel" src="tf-screens-tasks.jsx"></script>
<script type="text/babel" src="tf-interactive.jsx"></script>

<script type="text/babel" data-presets="react">

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "daryo",
  "dark": false
}/*EDITMODE-END*/;

// Phone-frame artboard — returns a <DCArtboard> JSX element (called as a
// function, NOT used as a component, so DCSection's child-walk finds it).
function phoneArt({ id, label, platform = 'ios', children, palette, dark, screenLabel }) {
  const w = platform === 'ios' ? 402 : 412;
  const h = platform === 'ios' ? 874 : 892;
  return (
    <DCArtboard key={id} id={id} label={label} width={w + 32} height={h + 32}>
      <div data-screen-label={screenLabel}
           style={{
             width: w + 32, height: h + 32,
             display: 'flex', alignItems: 'center', justifyContent: 'center',
           }}>
        <div style={{
          width: w, height: h, borderRadius: platform === 'ios' ? 52 : 44,
          overflow: 'hidden', position: 'relative',
          background: 'var(--sf-bg, #FBF6EC)',
          boxShadow: '0 30px 80px rgba(54,30,14,0.18), 0 8px 24px rgba(54,30,14,0.10), 0 0 0 11px #161310, 0 0 0 13px #2A2620',
        }}
        data-theme={dark ? 'dark' : 'light'}
        data-palette={palette || 'saroy'}>
          {children}
        </div>
      </div>
    </DCArtboard>
  );
}

// Render iOS + Android side-by-side — returns an array of two DCArtboards
function screenPair({ id, name, ios, android, palette, dark, screenLabel }) {
  return [
    phoneArt({ id: `${id}-ios`, label: `iOS · ${name}`, platform: 'ios',
               palette, dark, screenLabel: `${screenLabel} · iOS`, children: ios }),
    phoneArt({ id: `${id}-and`, label: `Android · ${name}`, platform: 'android',
               palette, dark, screenLabel: `${screenLabel} · Android`, children: android }),
  ];
}

// Custom palette swatches — each swatch shows the 3 representative colors
function PaletteSwatches({ value, options, onChange }) {
  return (
    <div style={{ padding: '4px 14px 12px', display: 'grid',
                   gridTemplateColumns: '1fr 1fr', gap: 8 }}>
      {options.map(opt => {
        const on = opt.id === value;
        return (
          <button key={opt.id} type="button" onClick={() => onChange(opt.id)}
                  style={{
                    padding: 10, borderRadius: 12, cursor: 'pointer',
                    background: on ? 'var(--om-tweaks-active-bg, #f3eee4)' : 'transparent',
                    border: on ? '1.5px solid var(--om-tweaks-active, #B85535)'
                               : '1px solid var(--om-tweaks-border, #ddd)',
                    display: 'flex', flexDirection: 'column', gap: 8, alignItems: 'flex-start',
                    fontFamily: 'inherit', textAlign: 'left',
                  }}>
            <div style={{ display: 'flex', gap: 4 }}>
              {opt.colors.map((c, i) => (
                <div key={i} style={{
                  width: 28, height: 28, borderRadius: 8, background: c,
                  border: '1px solid rgba(0,0,0,0.08)',
                }} />
              ))}
            </div>
            <span style={{ fontSize: 11, fontWeight: 600,
                            color: 'var(--om-tweaks-fg, #333)' }}>{opt.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [t, setT] = useTweaks(DEFAULTS);

  // Apply palette/dark to the canvas root so frames inherit
  React.useEffect(() => {
    document.documentElement.setAttribute('data-palette', t.palette);
    document.documentElement.setAttribute('data-theme', t.dark ? 'dark' : 'light');
  }, [t.palette, t.dark]);

  const palettes = [
    ['#B85535', '#D89A2E', '#FBF6EC'], // Saroy
    ['#1F6B66', '#C4892F', '#F2F1ED'], // Marvarid
    ['#2A3D8F', '#D8A22A', '#F4F1E8'], // Samarqand
    ['#4F6A3A', '#BA8C2C', '#F1EFE6'], // Daryo
  ];  return (
    <>
      <DesignCanvas>
        {/* ──────────────────────────────────── */}
        <DCSection id="interactive" title="🎮 Interaktiv prototip"
                   subtitle="Bosing va sinab ko‘ring. Tablar ishlaydi · ekranlar silliq o‘tadi · har bir element jonli. Palitra / dark mode tweaks orqali.">
          <DCArtboard id="ip-phone" label="Live prototype · iOS" width={520} height={920}>
            <div style={{ width: 520, height: 920,
                           display: 'flex', alignItems: 'center', justifyContent: 'center' }}
                 data-palette={t.palette} data-theme={t.dark ? 'dark' : 'light'}
                 className="sf-app">
              <InteractivePhone />
            </div>
          </DCArtboard>
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="brand" title="Brend va sistema"
                   subtitle="StarForge EDU · O‘qituvchilar ilovasi · Markaziy Osiyo bozori uchun zamonaviy maktab platformasi">
          <DCArtboard id="brand-card" label="Identity" width={820} height={460}>
            <div style={{ width: 820, height: 460,
                           background: 'var(--sf-bg)', borderRadius: 24,
                           border: '1px solid var(--sf-border)',
                           overflow: 'hidden' }}
                 data-palette={t.palette} data-theme={t.dark ? 'dark' : 'light'}>
              <BrandCard />
            </div>
          </DCArtboard>
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="onboarding" title="Tizimga kirish"
                   subtitle="Foydalanuvchi nomi + parol. Markaz ma‘muri tomonidan beriladi.">
          {screenPair({ id: 'onb-login', name: 'Kirish', palette: t.palette, dark: t.dark,
                        screenLabel: '01 Login',
                        ios: <LoginScreen platform="ios" />,
                        android: <LoginScreen platform="android" /> })}
          {screenPair({ id: 'onb-welcome', name: 'Xush kelibsiz', palette: t.palette, dark: t.dark,
                        screenLabel: '02 Welcome',
                        ios: <WelcomeScreen platform="ios" />,
                        android: <WelcomeScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="daily" title="Kundalik foydalanish"
                   subtitle="Bugun ekrani · jadval · darsning batafsil ko‘rinishi. Eng ko‘p qaytariladigan oqim.">
          {screenPair({ id: 'today', name: 'Bugun', palette: t.palette, dark: t.dark,
                        screenLabel: '03 Today',
                        ios: <TodayScreen platform="ios" />,
                        android: <TodayScreen platform="android" /> })}
          {screenPair({ id: 'sched', name: 'Jadval', palette: t.palette, dark: t.dark,
                        screenLabel: '04 Schedule',
                        ios: <ScheduleScreen platform="ios" />,
                        android: <ScheduleScreen platform="android" /> })}
          {screenPair({ id: 'lesson', name: 'Dars · batafsil', palette: t.palette, dark: t.dark,
                        screenLabel: '05 Lesson detail',
                        ios: <LessonScreen platform="ios" />,
                        android: <LessonScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="attend" title="Davomat"
                   subtitle="Imo-ishorali belgilash · swipe / long-press · sariq, yashil, qizil rang kodlari.">
          {screenPair({ id: 'att', name: 'Belgilash', palette: t.palette, dark: t.dark,
                        screenLabel: '06 Attendance',
                        ios: <AttendanceScreen platform="ios" />,
                        android: <AttendanceScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="people" title="Guruhlar va o‘quvchilar"
                   subtitle="O‘quv markaz uchun: 1 ustoz → 3–4 guruh, 1–2 fan. Asosiy navigatsion uchlik.">
          {screenPair({ id: 'cohorts', name: 'Guruhlar', palette: t.palette, dark: t.dark,
                        screenLabel: '07 Cohort list',
                        ios: <CohortListScreen platform="ios" />,
                        android: <CohortListScreen platform="android" /> })}
          {screenPair({ id: 'cohort', name: 'Guruh · 9-B', palette: t.palette, dark: t.dark,
                        screenLabel: '08 Cohort detail',
                        ios: <CohortDetailScreen platform="ios" />,
                        android: <CohortDetailScreen platform="android" /> })}
          {screenPair({ id: 'student', name: 'O‘quvchi', palette: t.palette, dark: t.dark,
                        screenLabel: '09 Student profile',
                        ios: <StudentProfileScreen platform="ios" />,
                        android: <StudentProfileScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="cards" title="Kartalar tizimi"
                   subtitle="Baho yo‘q — markaz qoidasiga ko‘ra Up / Down kartalar. Nomi dinamik: ‘Yulduz / Ogohlantirish’, ‘Smart / Warning’, va h.k.">
          {screenPair({ id: 'cards-list', name: 'Kartalar', palette: t.palette, dark: t.dark,
                        screenLabel: '10 Cards list',
                        ios: <CardsScreen platform="ios" />,
                        android: <CardsScreen platform="android" /> })}
          {screenPair({ id: 'cards-give', name: 'Karta berish', palette: t.palette, dark: t.dark,
                        screenLabel: '11 Give card',
                        ios: <GiveCardScreen platform="ios" />,
                        android: <GiveCardScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="ai" title="AI Suhbat · har bir guruh haqida"
                   subtitle="Guruhni tanlang va ustozning ma‘lumotlari (davomat, kartalar) asosida suhbatlashing. Token limiti markaz tomonidan boshqariladi.">
          {screenPair({ id: 'ai-list', name: 'Guruhlar', palette: t.palette, dark: t.dark,
                        screenLabel: '12 AI chat list',
                        ios: <AIChatListScreen platform="ios" />,
                        android: <AIChatListScreen platform="android" /> })}
          {screenPair({ id: 'ai-chat', name: 'Suhbat · 9-B', palette: t.palette, dark: t.dark,
                        screenLabel: '13 AI chat',
                        ios: <AIChatScreen platform="ios" />,
                        android: <AIChatScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="print" title="Print · filial printerlari"
                   subtitle="Filial printerlarini ko‘rish, navbat tuzish, materialni tanlash yoki yuklash, sahifa ko‘rinishi va vaqtni belgilash.">
          {screenPair({ id: 'print', name: 'Printerlar', palette: t.palette, dark: t.dark,
                        screenLabel: '14 Print',
                        ios: <PrintScreen platform="ios" />,
                        android: <PrintScreen platform="android" /> })}
          {screenPair({ id: 'print-new', name: 'Yangi print', palette: t.palette, dark: t.dark,
                        screenLabel: '15 New print job',
                        ios: <NewPrintJobScreen platform="ios" />,
                        android: <NewPrintJobScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="tasks" title="Vazifalar · Notion-stil"
                   subtitle="Boshqaruvdan kelgan va shaxsiy vazifalar. Loyihalar, prioritet, sub-vazifalar, faollik tarixi.">
          {screenPair({ id: 'tasks', name: 'Vazifalar', palette: t.palette, dark: t.dark,
                        screenLabel: '14 Tasks',
                        ios: <TasksScreen platform="ios" />,
                        android: <TasksScreen platform="android" /> })}
          {screenPair({ id: 'task-d', name: 'Vazifa · batafsil', palette: t.palette, dark: t.dark,
                        screenLabel: '15 Task detail',
                        ios: <TaskDetailScreen platform="ios" />,
                        android: <TaskDetailScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="mgmt" title="Boshqaruv bilan to‘g‘ridan-to‘g‘ri"
                   subtitle="Direktor, metodist, filial menejeri va markaz e‘lonlari uchun alohida kanal.">
          {screenPair({ id: 'mgmt-list', name: 'Boshqaruv inbox', palette: t.palette, dark: t.dark,
                        screenLabel: '16 Mgmt inbox',
                        ios: <MgmtInboxScreen platform="ios" />,
                        android: <MgmtInboxScreen platform="android" /> })}
          {screenPair({ id: 'mgmt-chat', name: 'Direktor', palette: t.palette, dark: t.dark,
                        screenLabel: '17 Mgmt chat',
                        ios: <MgmtChatScreen platform="ios" />,
                        android: <MgmtChatScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="surveys" title="So‘rovnomalar · markaz tomonidan"
                   subtitle="Yorqin indikator topshirilmaganlarni ko‘rsatadi. Anonim · profilingiz sozlamalariga bog‘liq.">
          {screenPair({ id: 'sv-list', name: 'So‘rovnomalar', palette: t.palette, dark: t.dark,
                        screenLabel: '18 Surveys',
                        ios: <SurveysScreen platform="ios" />,
                        android: <SurveysScreen platform="android" /> })}
          {screenPair({ id: 'sv-form', name: 'Topshirish', palette: t.palette, dark: t.dark,
                        screenLabel: '19 Survey form',
                        ios: <SurveyFormScreen platform="ios" />,
                        android: <SurveyFormScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="work" title="Topshiriqlar"
                   subtitle="Sinfdagi mashqlar va uy ishlari. Ballar yo‘q — ish topshirildi/tayyor emas.">
          {screenPair({ id: 'asg-list', name: 'Topshiriqlar', palette: t.palette, dark: t.dark,
                        screenLabel: '16 Assignments',
                        ios: <AssignmentsScreen platform="ios" />,
                        android: <AssignmentsScreen platform="android" /> })}
          {screenPair({ id: 'asg-new', name: 'Yangi topshiriq', palette: t.palette, dark: t.dark,
                        screenLabel: '17 Create assignment',
                        ios: <CreateAssignmentScreen platform="ios" />,
                        android: <CreateAssignmentScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="comm" title="Materiallar, xabarlar, bildirishnomalar"
                   subtitle="Kontent kutubxonasi, ota-onalar bilan suhbat (AI javob takliflari), bildirishnomalar markazi (print + xabar).">
          {screenPair({ id: 'content', name: 'Materiallar', palette: t.palette, dark: t.dark,
                        screenLabel: '18 Content library',
                        ios: <ContentScreen platform="ios" />,
                        android: <ContentScreen platform="android" /> })}
          {screenPair({ id: 'msgs', name: 'Ota-onalar', palette: t.palette, dark: t.dark,
                        screenLabel: '19 Messages',
                        ios: <MessagesScreen platform="ios" />,
                        android: <MessagesScreen platform="android" /> })}
          {screenPair({ id: 'chat', name: 'Suhbat · ota-ona', palette: t.palette, dark: t.dark,
                        screenLabel: '20 Parent chat',
                        ios: <ChatScreen platform="ios" />,
                        android: <ChatScreen platform="android" /> })}
          {screenPair({ id: 'notif', name: 'Bildirishnomalar', palette: t.palette, dark: t.dark,
                        screenLabel: '21 Notifications',
                        ios: <NotificationsScreen platform="ios" />,
                        android: <NotificationsScreen platform="android" /> })}
        </DCSection>

        {/* ──────────────────────────────────── */}
        <DCSection id="account" title="Profil va sozlamalar"
                   subtitle="Ustozning shaxsiy hisobi, parol, til, AI sozlamalari, karta nomlari, markaz limitlari.">
          {screenPair({ id: 'settings', name: 'Profil', palette: t.palette, dark: t.dark,
                        screenLabel: '22 Settings',
                        ios: <SettingsScreen platform="ios" />,
                        android: <SettingsScreen platform="android" /> })}
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="StarForge tweaks">
        <TweakSection label="Mavzu · Theme">
          <TweakToggle label="Qora mavzu · Dark mode" value={t.dark}
                       onChange={(v) => setT('dark', v)} />
        </TweakSection>
        <TweakSection label="Palitra · Palette">
          <PaletteSwatches value={t.palette}
                           options={[
                             { id: 'saroy',     label: 'Saroy · Terracotta', colors: palettes[0] },
                             { id: 'marvarid',  label: 'Marvarid · Pearl',   colors: palettes[1] },
                             { id: 'samarqand', label: 'Samarqand · Indigo', colors: palettes[2] },
                             { id: 'daryo',     label: 'Daryo · Sage',       colors: palettes[3] },
                           ]}
                           onChange={(v) => setT('palette', v)} />
        </TweakSection>
        <div style={{ padding: '8px 14px 14px', fontSize: 11,
                       color: 'var(--om-tweaks-muted, #888)', lineHeight: 1.5 }}>
          Barcha ekranlar bir vaqtda yangilanadi. 8-qirrali yulduz motivi har bir ekranda takrorlanadi.
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
