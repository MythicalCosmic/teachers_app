name: starforge_staff
description: "StarForge EDU staff mobile workspace"
publish_to: 'none'

version: 1.2.0+4

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.4
  # 11.x assumes AGP 9 built-in Kotlin, while this app still includes plugins
  # on Flutter's temporary legacy-KGP bridge. Keep the latest compatible 10.x.
  file_picker: 10.3.10
  go_router: ^14.6.2
  http: ^1.2.2
  image_picker: ^1.2.3
  just_audio: ^0.10.6
  record: ^7.1.1
  flutter_lame: ^1.0.3
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  video_player: ^2.13.0
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/manrope/Manrope-Variable.ttf
    - family: Instrument Serif
      fonts:
        - asset: assets/fonts/instrument_serif/InstrumentSerif-Regular.ttf
        - asset: assets/fonts/instrument_serif/InstrumentSerif-Italic.ttf
          style: italic
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
