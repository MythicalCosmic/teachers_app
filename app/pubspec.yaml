name: starforge_staff
description: "StarForge EDU staff mobile workspace"
publish_to: 'none'

version: 1.1.1+3

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/manrope/Manrope-Variable.ttf
    - family: Instrument Serif
      fonts:
        - asset: assets/fonts/instrument_serif/InstrumentSerif-Regular.ttf
        - asset: assets/fonts/instrument_serif/InstrumentSerif-Italic.ttf
          style: italic
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Variable.ttf
