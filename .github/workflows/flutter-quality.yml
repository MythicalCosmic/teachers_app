name: Flutter quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test tool

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --reporter expanded

      - name: Build Android debug package
        run: flutter build apk --debug

      - name: Upload Android debug package
        uses: actions/upload-artifact@v4
        with:
          name: starforge-staff-android-debug
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
