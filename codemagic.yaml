workflows:
  ios-unsigned-release:
    name: StarForge Staff - Unsigned Release for 3uTools
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    environment:
      flutter: "3.44.6"
      xcode: "26.4"
      cocoapods: default
      # After creating this group in Codemagic, uncomment it to compile the
      # owner-supplied Firebase values handled by the build script below.
      # groups:
      #   - firebase_credentials

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Verify Flutter project
        script: |
          set -euo pipefail
          test -f pubspec.yaml
          test -d ios/Runner.xcodeproj
          flutter --version

      - name: Resolve Flutter dependencies
        script: flutter pub get

      - name: Check formatting
        script: dart format --output=none --set-exit-if-changed lib test tool

      - name: Analyze app
        script: flutter analyze --no-pub

      - name: Run tests
        script: flutter test --reporter expanded

      - name: Install native iOS dependencies
        script: find ios -name Podfile -execdir pod install \;

      - name: Build unsigned iPhone release
        script: |
          set -euo pipefail

          # Push remains optional for unsigned QA builds. When Firebase secrets
          # are present, forward them explicitly: ordinary shell environment
          # variables are not visible to Dart's String.fromEnvironment.
          # Keep this array non-empty: macOS Bash 3.2 treats expansion of an
          # empty array as an unbound variable when `set -u` is active.
          flutter_build_args=(
            ios
            --release
            --no-codesign
            "--build-number=${PROJECT_BUILD_NUMBER:-1}"
          )
          firebase_plist=""
          if [[ -n "${FIREBASE_IOS_CONFIG_BASE64:-}" ]]; then
            firebase_plist="$(mktemp)"
            trap 'rm -f "$firebase_plist"' EXIT
            printf '%s' "$FIREBASE_IOS_CONFIG_BASE64" | /usr/bin/base64 -D > "$firebase_plist"
            /usr/libexec/PlistBuddy -c 'Print :GOOGLE_APP_ID' "$firebase_plist" >/dev/null
            firebase_api_key="$(/usr/libexec/PlistBuddy -c 'Print :API_KEY' "$firebase_plist")"
            firebase_app_id="$(/usr/libexec/PlistBuddy -c 'Print :GOOGLE_APP_ID' "$firebase_plist")"
            firebase_sender_id="$(/usr/libexec/PlistBuddy -c 'Print :GCM_SENDER_ID' "$firebase_plist")"
            firebase_project_id="$(/usr/libexec/PlistBuddy -c 'Print :PROJECT_ID' "$firebase_plist")"
            firebase_storage_bucket="$(/usr/libexec/PlistBuddy -c 'Print :STORAGE_BUCKET' "$firebase_plist" 2>/dev/null || true)"
            firebase_bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :BUNDLE_ID' "$firebase_plist")"
          else
            firebase_api_key="${FIREBASE_API_KEY:-}"
            firebase_app_id="${FIREBASE_APP_ID:-}"
            firebase_sender_id="${FIREBASE_MESSAGING_SENDER_ID:-}"
            firebase_project_id="${FIREBASE_PROJECT_ID:-}"
            firebase_storage_bucket="${FIREBASE_STORAGE_BUCKET:-}"
            firebase_bundle_id="${FIREBASE_IOS_BUNDLE_ID:-uz.starforge.starforgeEdu}"
          fi

          firebase_present=0
          for value in "$firebase_api_key" "$firebase_app_id" "$firebase_sender_id" "$firebase_project_id"; do
            [[ -n "$value" ]] && firebase_present=$((firebase_present + 1))
          done
          if [[ "$firebase_present" -ne 0 && "$firebase_present" -ne 4 ]]; then
            echo "Firebase push configuration is incomplete; provide all four required values or none." >&2
            exit 1
          fi
          if [[ "$firebase_present" -eq 4 ]]; then
            if [[ "$firebase_bundle_id" != "uz.starforge.starforgeEdu" ]]; then
              echo "Firebase iOS bundle id does not match uz.starforge.starforgeEdu." >&2
              exit 1
            fi
            flutter_build_args+=(
              "--dart-define=FIREBASE_API_KEY=$firebase_api_key"
              "--dart-define=FIREBASE_APP_ID=$firebase_app_id"
              "--dart-define=FIREBASE_MESSAGING_SENDER_ID=$firebase_sender_id"
              "--dart-define=FIREBASE_PROJECT_ID=$firebase_project_id"
              "--dart-define=FIREBASE_IOS_BUNDLE_ID=$firebase_bundle_id"
            )
            if [[ -n "$firebase_storage_bucket" ]]; then
              flutter_build_args+=("--dart-define=FIREBASE_STORAGE_BUCKET=$firebase_storage_bucket")
            fi
            echo "Firebase client configuration enabled for this build."
          else
            echo "Firebase client configuration absent; building with push safely disabled."
          fi

          flutter build "${flutter_build_args[@]}"

      - name: Package and verify 3uTools artifacts
        script: |
          set -euo pipefail

          expected_bundle_id="uz.starforge.starforgeEdu"
          source_app="build/ios/iphoneos/Runner.app"
          test -d "$source_app"
          test -f "$source_app/Info.plist"

          actual_bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$source_app/Info.plist")"
          if [[ "$actual_bundle_id" != "$expected_bundle_id" ]]; then
            echo "App bundle ID is '$actual_bundle_id', expected '$expected_bundle_id'." >&2
            exit 1
          fi

          executable_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$source_app/Info.plist")"
          test -f "$source_app/$executable_name"
          file "$source_app/$executable_name" | grep -q arm64

          output_dir="$CM_EXPORT_DIR"
          stage_dir="$(mktemp -d)"
          verify_dir="$(mktemp -d)"
          trap 'rm -rf "$stage_dir" "$verify_dir"' EXIT
          mkdir -p "$output_dir" "$stage_dir/Payload"

          ditto "$source_app" "$stage_dir/Payload/Runner.app"

          final_ipa="$output_dir/StarForge-Staff-unsigned-release.ipa"
          app_zip="$output_dir/StarForge-Staff-Runner.app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$stage_dir/Payload" "$final_ipa"
          ditto -c -k --sequesterRsrc --keepParent "$source_app" "$app_zip"

          unzip -q "$final_ipa" -d "$verify_dir"
          test -f "$verify_dir/Payload/Runner.app/Info.plist"
          packaged_bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$verify_dir/Payload/Runner.app/Info.plist")"
          test "$packaged_bundle_id" = "$expected_bundle_id"

          shasum -a 256 "$final_ipa" > "$final_ipa.sha256"
          shasum -a 256 "$app_zip" > "$app_zip.sha256"
          echo "Verified unsigned release IPA for 3uTools signing: $final_ipa"

      - name: Confirm exported artifacts
        script: |
          set -euo pipefail
          test -s "$CM_EXPORT_DIR/StarForge-Staff-unsigned-release.ipa"
          test -s "$CM_EXPORT_DIR/StarForge-Staff-Runner.app.zip"
          test -s "$CM_EXPORT_DIR/StarForge-Staff-unsigned-release.ipa.sha256"
          test -s "$CM_EXPORT_DIR/StarForge-Staff-Runner.app.zip.sha256"
          echo "Codemagic export directory:"
          ls -lah "$CM_EXPORT_DIR"

    artifacts:
      - $CM_EXPORT_DIR/StarForge-Staff-unsigned-release.ipa
      - $CM_EXPORT_DIR/StarForge-Staff-unsigned-release.ipa.sha256
      - $CM_EXPORT_DIR/StarForge-Staff-Runner.app.zip
      - $CM_EXPORT_DIR/StarForge-Staff-Runner.app.zip.sha256
      - $CM_BUILD_DIR/app/build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log
