workflows:
  ios-unsigned-release:
    name: StarForge Staff - Unsigned Release for 3uTools
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: app

    environment:
      flutter: "3.44.6"
      xcode: "16.4"
      cocoapods: default

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Verify Flutter project
        script: |
          set -euo pipefail
          test -f pubspec.yaml
          test -d ios/Runner.xcodeproj
          flutter --version

      - name: Resolve Flutter dependencies
        script: flutter pub get

      - name: Install native iOS dependencies
        script: find ios -name Podfile -execdir pod install \;

      - name: Check formatting
        script: dart format --output=none --set-exit-if-changed lib test tool

      - name: Analyze app
        script: flutter analyze

      - name: Run tests
        script: flutter test --reporter expanded

      - name: Build unsigned iPhone release
        script: |
          set -euo pipefail
          flutter build ios --release --no-codesign \
            --build-number="${PROJECT_BUILD_NUMBER:-1}"

      - name: Package and verify 3uTools artifacts
        script: |
          set -euo pipefail

          expected_bundle_id="uz.starforge.starforgeEdu"
          source_app="build/ios/iphoneos/Runner.app"
          test -d "$source_app"
          test -f "$source_app/Info.plist"

          actual_bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$source_app/Info.plist")"
          if [[ "$actual_bundle_id" != "$expected_bundle_id" ]]; then
            echo "App bundle ID is '$actual_bundle_id', expected '$expected_bundle_id'." >&2
            exit 1
          fi

          executable_name="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$source_app/Info.plist")"
          test -f "$source_app/$executable_name"
          file "$source_app/$executable_name" | grep -q arm64

          output_dir="$CM_EXPORT_DIR"
          stage_dir="$(mktemp -d)"
          verify_dir="$(mktemp -d)"
          trap 'rm -rf "$stage_dir" "$verify_dir"' EXIT
          mkdir -p "$output_dir" "$stage_dir/Payload"

          ditto "$source_app" "$stage_dir/Payload/Runner.app"

          final_ipa="$output_dir/StarForge-Staff-unsigned-release.ipa"
          app_zip="$output_dir/StarForge-Staff-Runner.app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$stage_dir/Payload" "$final_ipa"
          ditto -c -k --sequesterRsrc --keepParent "$source_app" "$app_zip"

          unzip -q "$final_ipa" -d "$verify_dir"
          test -f "$verify_dir/Payload/Runner.app/Info.plist"
          packaged_bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$verify_dir/Payload/Runner.app/Info.plist")"
          test "$packaged_bundle_id" = "$expected_bundle_id"

          shasum -a 256 "$final_ipa" > "$final_ipa.sha256"
          shasum -a 256 "$app_zip" > "$app_zip.sha256"
          echo "Verified unsigned release IPA for 3uTools signing: $final_ipa"

      - name: Confirm exported artifacts
        script: |
          set -euo pipefail
          test -s "$CM_EXPORT_DIR/StarForge-Staff-unsigned-release.ipa"
          test -s "$CM_EXPORT_DIR/StarForge-Staff-Runner.app.zip"
          test -s "$CM_EXPORT_DIR/StarForge-Staff-unsigned-release.ipa.sha256"
          test -s "$CM_EXPORT_DIR/StarForge-Staff-Runner.app.zip.sha256"
          echo "Codemagic export directory:"
          ls -lah "$CM_EXPORT_DIR"

    artifacts:
      - $CM_EXPORT_DIR/StarForge-Staff-unsigned-release.ipa
      - $CM_EXPORT_DIR/StarForge-Staff-unsigned-release.ipa.sha256
      - $CM_EXPORT_DIR/StarForge-Staff-Runner.app.zip
      - $CM_EXPORT_DIR/StarForge-Staff-Runner.app.zip.sha256
      - $CM_BUILD_DIR/app/build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log
